<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shree Ram Hospital</title>

<style>
body{font-family:Arial;background:#eef3ff}
.container{max-width:900px;margin:40px auto;background:white;padding:20px;border-radius:12px}
input,textarea{width:100%;padding:10px;margin:6px 0;border:1px solid #ccc;border-radius:6px}
button{padding:8px 12px;margin:4px;background:#0b5ed7;color:white;border:none;border-radius:6px}
.hidden{display:none}
.logout{background:#dc3545}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border:1px solid #ddd;padding:6px;text-align:center}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginBox">
<h2>Hospital Login</h2>
<input id="email" placeholder="Enter Email">
<input id="password" type="password" placeholder="Enter Password">
<button onclick="loginUser()">Login</button>
</div>


<!-- OPERATOR PANEL -->
<div class="container hidden" id="operatorPanel">
<h2>Operator Panel</h2>
<button onclick="showForm()">Add Patient</button>
<button class="logout" onclick="logoutUser()">Logout</button>
</div>


<!-- DOCTOR PANEL -->
<div class="container hidden" id="doctorPanel">
<h2>Doctor Panel</h2>
<input id="doctorToken" placeholder="Enter Token">
<div id="doctorData"></div>
<textarea id="doctorMedicine" placeholder="Write Medicine"></textarea>
<button onclick="saveMedicine()">Save Medicine</button>
<button class="logout" onclick="logoutUser()">Logout</button>
</div>


<!-- MEDICAL PANEL -->
<div class="container hidden" id="medicalPanel">
<h2>Medical Panel</h2>
<input id="medicalToken" placeholder="Enter Token">
<div id="medicalData"></div>
<input id="amount" placeholder="Enter Amount">
<button onclick="saveMedical()">Save & Print Bill</button>
<button class="logout" onclick="logoutUser()">Logout</button>
</div>


<!-- ADMIN PANEL -->
<div class="container hidden" id="adminPanel">
<h2>Admin Dashboard</h2>

<table>
<thead>
<tr>
<th>Token</th>
<th>Name</th>
<th>Age</th>
<th>Mobile</th>
<th>Problem</th>
<th>Medicine</th>
<th>Payment</th>
<th>Action</th>
</tr>
</thead>

<tbody id="adminTable"></tbody>
</table>

<button class="logout" onclick="logoutUser()">Logout</button>
</div>


<!-- ADD PATIENT FORM -->
<div class="container hidden" id="formBox">
<h2>New Patient Entry</h2>
<input id="name" placeholder="Patient Name">
<input id="age" placeholder="Age">
<input id="mobile" placeholder="Mobile">
<textarea id="problem" placeholder="Problem"></textarea>
<button onclick="savePatient()">Save Patient</button>
</div>



<script type="module">

import {initializeApp}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where,
doc,
getDoc,
updateDoc,
deleteDoc,
runTransaction
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


const firebaseConfig={
apiKey:"AIzaSyC6yZaFY3I1BBXj7vwEhOit_58Uq1owtRg",
authDomain:"hospital-management-syst-cbfad.firebaseapp.com",
projectId:"hospital-management-syst-cbfad"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let docId="";
let currentPatient={};


window.loginUser=async()=>{
await signInWithEmailAndPassword(auth,email.value,password.value);
};


window.logoutUser=()=>{
signOut(auth);
location.reload();
};


async function generateToken(){

const ref=doc(db,"settings","tokenCounter");

return await runTransaction(db,async(tx)=>{

const snap=await tx.get(ref);

let val=1;

if(snap.exists()){
const data=snap.data();
if(typeof data.value==="number") val=data.value;
}

let token="RAM"+String(val).padStart(3,"0");

tx.set(ref,{value:val+1},{merge:true});

return token;

});
}


onAuthStateChanged(auth,async(user)=>{

if(!user) return;

const roleDoc=await getDoc(doc(db,"users",user.email));

if(!roleDoc.exists()){
alert("User role missing in Firestore");
return;
}

const role=roleDoc.data().role;

loginBox.classList.add("hidden");

operatorPanel.classList.add("hidden");
doctorPanel.classList.add("hidden");
medicalPanel.classList.add("hidden");
adminPanel.classList.add("hidden");

if(role==="operator") operatorPanel.classList.remove("hidden");

else if(role==="doctor"){
doctorPanel.classList.remove("hidden");
doctorAuto();
}

else if(role==="medical"){
medicalPanel.classList.remove("hidden");
medicalAuto();
}

else if(role==="admin"){
adminPanel.classList.remove("hidden");
loadAdmin();
}

});


window.showForm=()=>{
operatorPanel.classList.add("hidden");
formBox.classList.remove("hidden");
};


window.savePatient=async()=>{

let n=document.getElementById("name").value.trim();
let a=document.getElementById("age").value.trim();
let m=document.getElementById("mobile").value.trim();
let p=document.getElementById("problem").value.trim();

if(!n||!a||!m||!p) return alert("Fill all fields");

let token=await generateToken();

await addDoc(collection(db,"patients"),{
name:n,
age:a,
mobile:m,
problem:p,
token,
medicine:"",
payment:"",
date:new Date()
});

alert("Token: "+token);

formBox.classList.add("hidden");
operatorPanel.classList.remove("hidden");

};


function doctorAuto(){

setInterval(async()=>{

if(!doctorToken.value) return;

let q=query(collection(db,"patients"),
where("token","==",doctorToken.value));

let snap=await getDocs(q);

snap.forEach(s=>{
docId=s.id;
currentPatient=s.data();

doctorData.innerHTML=
currentPatient.name+"<br>"+currentPatient.problem;
});

},800);
}


window.saveMedicine=async()=>{
await updateDoc(doc(db,"patients",docId),
{medicine:doctorMedicine.value});
alert("Medicine Saved");
};


function medicalAuto(){

setInterval(async()=>{

if(!medicalToken.value) return;

let q=query(collection(db,"patients"),
where("token","==",medicalToken.value));

let snap=await getDocs(q);

snap.forEach(s=>{
docId=s.id;
currentPatient=s.data();

medicalData.innerHTML=
currentPatient.name+"<br>"+
currentPatient.problem+"<br>"+
currentPatient.medicine;
});

},800);
}


window.saveMedical=async()=>{

await updateDoc(doc(db,"patients",docId),
{payment:amount.value});

let w=window.open("");

w.document.write(`
<h2 style="text-align:center">SHREE RAM HOSPITAL</h2>
Patient: ${currentPatient.name}<br>
Problem: ${currentPatient.problem}<br>
Medicine: ${currentPatient.medicine}<br>
Amount: ₹${amount.value}
<script>window.print()
`);

};


async function loadAdmin(){

let snap=await getDocs(collection(db,"patients"));

adminTable.innerHTML="";

snap.forEach(d=>{

let data=d.data();

adminTable.innerHTML+=`
<tr>
<td>${data.token||""}</td>
<td>${data.name||""}</td>
<td>${data.age||""}</td>
<td>${data.mobile||""}</td>
<td>${data.problem||""}</td>
<td>${data.medicine||""}</td>
<td>${data.payment||""}</td>
<td>
<button onclick="deletePatient('${d.id}')">Delete</button>
</td>
</tr>
`;

});
}


window.deletePatient=async(id)=>{
if(!confirm("Delete patient?")) return;
await deleteDoc(doc(db,"patients",id));
loadAdmin();
};

</script>

</body>
  </html>
